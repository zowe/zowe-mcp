name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      sdk-mode:
        description: "SDK source (fallback, nightly, release, pr, branch)"
        required: false
        default: "fallback"
        type: choice
        options:
          - fallback
          - nightly
          - release
          - pr
          - branch
      sdk-arg:
        description: "Argument for the SDK mode (version, PR number, or branch name)"
        required: false
        type: string

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message || '', '[ci skip]')"

    env:
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Download ZNP SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/sdk-switch.js ${{ inputs.sdk-mode || 'fallback' }} ${{ inputs.sdk-arg }}

      - name: Environment info
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "tsc: $(npx tsc --version)"
          echo "OS: $(uname -srm)"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"

      - name: Download VS Code API types
        run: npm run download-api -w packages/zowe-mcp-vscode

      - name: Build (common + server)
        run: |
          npm run build -w packages/zowe-mcp-common
          npm run build -w @zowe/mcp-server

      - run: npm run lint

      - run: npm run test

      - name: Pack @zowe/mcp-server (npm tarball)
        run: npm pack -w @zowe/mcp-server --pack-destination .

      - name: Upload npm package tarball
        uses: actions/upload-artifact@v4
        id: npm-pack-upload
        with:
          name: zowe-mcp-server-npm
          path: zowe-mcp-server-*.tgz
          if-no-files-found: error

      - name: Generate MCP reference docs
        run: npm run generate-docs

      - name: Build VS Code extension (VSIX)
        run: npm run package -w packages/zowe-mcp-vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        id: vsix-upload
        with:
          name: vsix
          path: packages/zowe-mcp-vscode/*.vsix

      - name: Upload MCP reference docs
        uses: actions/upload-artifact@v4
        id: docs-upload
        with:
          name: mcp-reference
          path: docs/mcp-reference.md

      - name: Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: Build artifacts
          number: ${{ github.event.pull_request.number }}
          message: |
            Build artifacts:
             - VS Code Extension (VSIX): ${{ steps.vsix-upload.outputs.artifact-url }}
             - MCP server npm package (.tgz): ${{ steps.npm-pack-upload.outputs.artifact-url }}
             - MCP Reference Docs: ${{ steps.docs-upload.outputs.artifact-url }}
