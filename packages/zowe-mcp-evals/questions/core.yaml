# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Core evals: info tool (mock)
config:
  name: core
  description: Agent must use info tool to report server and backend
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset default

questions:
  - id: server-info
    prompt: What MCP server is running and what backend type is it?
    assertions:
      - type: singleToolCall
        tool: info
      - type: answerContains
        pattern: "mock|Zowe|MCP|backend"
