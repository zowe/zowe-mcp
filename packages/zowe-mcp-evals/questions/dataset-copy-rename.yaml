# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# copyDataset and renameDataset evals (mock, default preset) - temp data sets and cleanup
config:
  name: dataset-copy-rename
  description: Agent must copy/rename data sets and clean up temp prefix
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset default

questions:
  - id: copy-member-then-cleanup
    prompt: Create a temporary PDS, copy member CUSTFILE from USER.SRC.COBOL into that PDS as member BACKUP, then list the members of the temp PDS to confirm, then delete all data sets under that temp prefix.
    assertions:
      - type: toolCallOrder
        sequence:
          - tool: createTempDataset
            args:
              type:
                - "PO"
                - "PO-E"
                - "PDS"
                - "PDSE"
                - "LIBRARY"
          - tool: copyDataset
            args:
              sourceDsn:
                - "USER.SRC.COBOL"
                - "'USER.SRC.COBOL'"
              sourceMember: "CUSTFILE"
              targetMember: "BACKUP"
          - tool: listMembers
          - tool: deleteDatasetsUnderPrefix
      - type: answerContains
        pattern: "BACKUP|member|success|complete|deleted"

  - id: rename-dataset-temp
    prompt: Create a temporary sequential data set, write one line "Rename test" to it, then rename that data set to another temp name, read the renamed data set to confirm the line, then delete data sets under the temp prefix.
    assertions:
      - type: toolCallOrder
        sequence:
          - tool: createTempDataset
            args:
              type:
                - "PS"
                - "SEQUENTIAL"
          - tool: writeDataset
            args:
              content: "Rename test"
          - tool: renameDataset
          - tool: readDataset
          - tool: deleteDatasetsUnderPrefix
      - type: answerContains
        substring: "Rename test"
