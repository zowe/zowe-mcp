# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Dataset-focused eval set (mock, default preset)
config:
  name: datasets
  description: List data sets and basic context
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset default

questions:
  - id: list-systems
    prompt: What systems are configured?
    assertions:
      - type: singleToolCall
        tool: listSystems
  - id: list-datasets-user
    prompt: List all my data sets under USER.
    assertions:
      - type: toolCall
        tool: listDatasets
        args:
          dsnPattern:
            - "USER.**"
            - "'USER.**'"
      - type: answerContains
        substring: SRC.COBOL
  - id: list-members-src-cobol
    prompt: List members of USER.SRC.COBOL.
    assertions:
      - type: toolCall
        tool: listMembers
        args:
          dsn:
            - "USER.SRC.COBOL"
            - "'USER.SRC.COBOL'"
      - type: answerContains
        substring: CUSTFILE
