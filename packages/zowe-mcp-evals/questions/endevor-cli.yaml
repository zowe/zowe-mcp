# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor CLI bridge evals — "cli" description variant (raw Zowe CLI help text).
config:
  name: endevor-cli
  description: >
    Same questions as endevor.yaml but using the 'cli' description variant
    (verbatim Zowe CLI --help text). Used for A/B comparison against intent/optimized.
  repetitions: 5
  minSuccessRate: 0.7
  questionsFrom: endevor
  mockServers:
    - name: endevor-ews
      cliScript: "${ZOWE_MCP_MOCK_EWS_DIR}/dist/cli/index.js"
      initArgs: "init ENDEVOR --output {dataDir}"
      port: 8080
      pluginName: endevor
  cliPluginDescVariant: cli
