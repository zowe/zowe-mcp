# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor code4z-gen-ai comparison: same questions as endevor.yaml but using the
# code4z-gen-ai TypeScript MCP server. Tool aliases normalize code4z-gen-ai names
# (get_elements, get_element_content, etc.) to the canonical Zowe MCP assertion names.
config:
  name: endevor-code4z
  description: >
    Same Endevor questions as endevor.yaml but running the code4z-gen-ai TypeScript
    MCP server against the same mock EWS server. Tool aliases normalize assertion names.
    Uses questionsFrom to share the endevor question set (same 10 questions, equal comparison).
  repetitions: 5
  minSuccessRate: 0.7
  questionsFrom: endevor
  mockServers:
    - name: endevor-ews
      cliScript: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mock_ews_server/dist/cli/index.js
      initArgs: "init ENDEVOR --output {dataDir}"
      port: 8080
  mcpServerScript: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mcp_servers_typescript/dist/mcp-server/stdio-server.js
  mcpServerArgs: >-
    --ews-url=http://localhost:8080
    --ews-api=EndevorService/api/v2
    --datasource=ENDEVOR
    --credentials=USER:PASSWORD
  toolAliases:
    get_environments: endevorListEnvironments
    get_stages: endevorListStages
    get_systems: endevorListSystems
    get_subsystems: endevorListSubsystems
    get_types: endevorListTypes
    get_elements: endevorListElements
    get_element_content: endevorPrintElement
    get_element_history: endevorPrintElement
    get_element_listing: endevorPrintElement
