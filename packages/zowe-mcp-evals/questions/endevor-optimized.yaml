# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor CLI bridge evals — "optimized" description variant (LLM-tuned via rephrase script).
config:
  name: endevor-optimized
  description: >
    Same questions as endevor.yaml but using the 'optimized' description variant
    (LLM-generated by rephrase-tool-descriptions.mjs). Used for A/B comparison.
  repetitions: 5
  minSuccessRate: 0.7
  questionsFrom: endevor
  mockServers:
    - name: endevor-ews
      cliScript: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mock_ews_server/dist/cli/index.js
      initArgs: "init ENDEVOR --output {dataDir}"
      port: 8080
      pluginName: endevor
  cliPluginDescVariant: optimized
