# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Smoke test: one Endevor question with a mock z/OS backend so getContext shows a connected system.
# Both the z/OS mock dir and the EWS data dir are created and cleaned up automatically by the harness.
config:
  name: endevor-smoke
  description: >
    Single Endevor tool smoke test. Combines a mock z/OS backend (so getContext shows a connected
    system) with a mock EWS server (auto-initialized via initArgs in a harness-managed temp dir).
    The mock z/OS backend prevents the model from being confused by getContext reporting no backend.
  repetitions: 1
  minSuccessRate: 1.0
  mock:
    initArgs: --preset minimal
  mockServers:
    - name: endevor-ews
      cliScript: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mock_ews_server/dist/cli/index.js
      initArgs: "init ENDEVOR --output {dataDir}"
      port: 8080
      pluginName: endevor

questions:
  - id: list-environments-smoke
    prompt: List all Endevor environments.
    assertions:
      - toolCall:
          tool: endevorListEnvironments
      - answerContains:
          pattern: "DEV|PRD"
