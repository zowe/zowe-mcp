# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor stress test — "cli" description variant.
config:
  name: endevor-stress-cli
  description: >
    Same stress questions as endevor-stress.yaml but using the 'cli' description variant.
  repetitions: 5
  minSuccessRate: 0.5
  questionsFrom: endevor-stress
  mockServers:
    - name: endevor-ews
      cliScript: "${ZOWE_MCP_MOCK_EWS_DIR}/dist/cli/index.js"
      initArgs: "init ENDEVOR --output {dataDir}"
      port: 8080
      pluginName: endevor
  cliPluginDescVariant: cli
