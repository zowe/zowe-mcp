# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor CLI bridge evals: Zowe CLI bridge (endevor* tools) vs mock EWS server
config:
  name: endevor
  description: >
    Endevor MCP tools via Zowe CLI bridge against mock EWS server.
    Tests listing environments, systems, subsystems, types, elements, and printing element content.
  repetitions: 5
  minSuccessRate: 0.7
  endevorMockEws:
    cliScript: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mock_ews_server/dist/cli/index.js
    configPath: /Users/plape03/workspace/github.gwd.broadcom.net/code4z-gen-ai/mock_ews_server/mock-ews-config.json
    port: 8080

questions:
  - id: list-environments
    prompt: List all Endevor environments.
    assertions:
      - toolCall:
          tool: endevorListEnvironments
      - answerContains:
          pattern: "DEV|PRD"

  - id: list-environments-both-present
    prompt: What Endevor environments are available? Show me all of them.
    assertions:
      - toolCall:
          tool: endevorListEnvironments
      - answerContains:
          substring: DEV
      - answerContains:
          substring: PRD

  - id: list-systems-dev
    prompt: What systems exist in the DEV environment, stage 1?
    assertions:
      - toolCall:
          tool: endevorListSystems
          args:
            environment: DEV
      - answerContains:
          substring: SYS1

  - id: list-subsystems
    prompt: List all subsystems under environment DEV, stage 1, system SYS1.
    assertions:
      - toolCall:
          tool: endevorListSubsystems
          args:
            environment: DEV
            system: SYS1
      - answerContains:
          substring: SUB1

  - id: list-types
    prompt: What element types are available in DEV environment, stage 1, system SYS1?
    assertions:
      - toolCall:
          tool: endevorListTypes
          args:
            environment: DEV
            system: SYS1
      - answerContains:
          pattern: "COBPGM|COPYBOOK"

  - id: list-elements-cobpgm
    prompt: List all COBOL programs (type COBPGM) in the DEV environment, stage 1, system SYS1, subsystem SUB1.
    assertions:
      - toolCall:
          tool: endevorListElements
          args:
            environment: DEV
            stageNumber: "1"
            system: SYS1
            subsystem: SUB1
            type: COBPGM
      - answerContains:
          pattern: "PROG0[1-5]"

  - id: list-elements-count
    prompt: How many COBPGM elements are there in DEV environment stage 1 system SYS1 subsystem SUB1? List them all.
    assertions:
      - toolCall:
          tool: endevorListElements
      - answerContains:
          pattern: "[Ff]ive|5|PROG0[1-5]"

  - id: print-element
    prompt: >
      Show me the source code of the PROG01 element (type COBPGM) from the DEV environment,
      stage 1, system SYS1, subsystem SUB1.
    assertions:
      - toolCall:
          tool: endevorPrintElement
          args:
            element: PROG01
            type: COBPGM
            environment: DEV
            system: SYS1
            subsystem: SUB1
      - answerContains:
          pattern: "PROG01|PROGRAM-ID|IDENTIFICATION DIVISION"

  - id: context-then-list
    prompt: Set up the Endevor context for environment DEV, stage 1, system SYS1, subsystem SUB1, then list all COBPGM elements.
    assertions:
      - toolCallOrder:
          - tool: endevorSetContext
          - tool: endevorListElements
      - answerContains:
          pattern: "PROG0[1-5]"

  - id: list-copybooks
    prompt: What copybook elements (type COPYBOOK) exist in the DEV environment, stage 1, system SYS1, subsystem SUB1?
    assertions:
      - toolCall:
          tool: endevorListElements
          args:
            type: COPYBOOK
      - answerContains:
          pattern: "CPYBK0[12]"
