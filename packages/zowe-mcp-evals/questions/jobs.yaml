# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Job evals: require native backend (mock does not implement job operations).
# For submit-jcl-from-dataset, the native system must have the dataset (e.g. USER.JCL.CNTL(COMPILE))
# or adjust the prompt to a DSN that exists on your system.
config:
  name: jobs
  description: Agent must use listJobs or getJobStatus; requires native z/OS backend
  repetitions: 1
  minSuccessRate: 0.8
  native:
    serverArgs: --native --config native-config.json

questions:
  - id: list-my-jobs
    prompt: List my recent jobs on the system.
    assertions:
      - type: toolCall
        tool: listJobs
      - type: answerContains
        pattern: "job|Job|JOB"

  - id: job-status
    prompt: What is the status of my most recent job?
    assertions:
      - type: toolCall
        tool: listJobs
      - type: answerContains
        pattern: "status|ACTIVE|OUTPUT|CC|RC|retcode|phase"

  - id: submit-jcl-from-dataset
    prompt: Submit the JCL in data set USER.JCL.CNTL(COMPILE) as a job.
    assertions:
      - type: toolCall
        tool: submitJobFromDataset
        args:
          dsn:
            - "USER.JCL.CNTL(COMPILE)"
            - "'USER.JCL.CNTL(COMPILE)'"
            - "USER.JCL.CNTL"
            - "'USER.JCL.CNTL'"

  - id: list-jobs-then-spool-and-read
    prompt: List my jobs, then list the spool files for the most recent job and show me the content of the first spool file.
    assertions:
      anyOf:
        - type: toolCallOrder
          sequence:
            - tool: listJobs
            - tool: listJobFiles
            - tool: readJobFile
        - type: toolCallOrder
          sequence:
            - tool: listJobs
            - tool: getJobOutput
