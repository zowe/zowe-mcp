# Pagination eval set: listMembers only. Asserts every call has correct dsn, offset, and limit.
# Uses inventory preset (USER.INVNTORY with 2000 members; default limit 500 => 4 pages).
config:
  name: pagination
  description: Agent must page through listMembers with correct parameters each call
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset inventory

questions:
  # All 4 pages: offset 0, 500, 1000, 1500 (limit 500 each).
  - id: list-members-inventory-all-pages
    prompt: List members of USER.INVNTORY
    assertions:
      - type: toolCallSequence
        tool: listMembers
        sequence:
          - dsn: "USER.INVNTORY"
          - dsn: "USER.INVNTORY"
            offset: 500
            limit: 500
          - dsn: "USER.INVNTORY"
            offset: 1000
            limit: 500
          - dsn: "USER.INVNTORY"
            offset: 1500
            limit: 500
      - type: answerContains
        pattern: "2,?000"
