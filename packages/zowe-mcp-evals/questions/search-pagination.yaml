# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Search with pagination: USER.INVNTORY has 2000 members; agent should page through search results.
config:
  name: search-pagination
  description: Agent must use searchInDataset and page when hasMore is true
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset pagination

questions:
  - id: search-inventory-many-members
    prompt: Search for the string "name" in dataset USER.INVNTORY and tell me how many members contain a match.
    assertions:
      - type: minToolCalls
        tool: searchInDataset
        minCount: 2
      - type: toolCall
        tool: searchInDataset
        args:
          dsn:
            - "USER.INVNTORY"
            - "'USER.INVNTORY'"
          string: "name"
      - type: answerContains
        substring: member
