# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# TSO evals: runSafeTsoCommand with LISTALC, LISTDS, WHO (mock returns canned output)
config:
  name: tso
  description: Agent must use runSafeTsoCommand for LISTALC, LISTDS, WHO
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset minimal

questions:
  - id: tso-list-allocations
    prompt: What data sets are currently allocated in my TSO session?
    assertions:
      - toolCall:
          tool: runSafeTsoCommand
          args:
            commandText:
              - "LISTALC"
              - "LISTA"
              - "LISTDS"
      - answerContains:
          pattern: "SYSIN|USER.INPUT|Allocations|allocated"

  - id: tso-list-dataset-attributes
    prompt: Run TSO to show the attributes of a data set (like RECFM, LRECL).
    assertions:
      - toolCall:
          tool: runSafeTsoCommand
          args:
            commandText:
              - "LISTDS"
              - "LISTD"
      - answerContains:
          pattern: "RECFM|LRECL|USER.MOCK.DATA"

  - id: tso-who
    prompt: Who am I in TSO?
    assertions:
      - name: getContext or TSO WHO both yield current user
        toolCall:
          oneOf:
            - tool: getContext
            - tool: runSafeTsoCommand
              args: { commandText: "WHO" }
      - answerContains:
          pattern: "USER|mockuser"
