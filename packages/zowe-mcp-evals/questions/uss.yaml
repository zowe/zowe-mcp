# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# USS evals: getUssHome, listUssFiles, readUssFile (mock with init-mock USS tree for first user)
config:
  name: uss
  description: Agent must use getUssHome, listUssFiles, readUssFile
  repetitions: 2
  minSuccessRate: 0.8
  mock:
    initArgs: --preset minimal

questions:
  - id: uss-home
    prompt: What is my USS home directory on the mainframe?
    assertions:
      - toolCall:
          tool: getUssHome
      - answerContains:
          pattern: '/u/|home'

  - id: uss-list-home
    prompt: List the files in my USS home directory.
    assertions:
      - toolCall:
          tool: listUssFiles
      - answerContains:
          pattern: 'file.txt|subdir|directory|file'

  - id: uss-read-file
    prompt: Read the contents of file.txt in my USS home directory.
    assertions:
      - toolCall:
          tool: readUssFile
          args:
            path:
              - 'file.txt'
              - '/u/USER/file.txt'
      - answerContains:
          substring: 'USS mock'

  - id: uss-write-temp-read-cleanup
    prompt: Create a temporary file under a temp directory in my USS home, write "USS eval test" to it, read it back, then delete all temp files under that temp directory.
    assertions:
      - name: getUssTempDir then create/write/read/cleanup
        toolCallOrder:
          - tool: getUssTempDir
          - tools:
              - createTempUssFile
              - getUssTempPath
          - tool: writeUssFile
            args:
              lines: ['USS eval test']
          - tool: readUssFile
          - tools:
              - deleteUssTempUnderDir
              - deleteUssFile
      - answerContains:
          substring: 'USS eval test'
