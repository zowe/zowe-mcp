# yaml-language-server: $schema=../schemas/evals-question-set.schema.json
# Endevor stress test — "optimized" description variant.
config:
  name: endevor-stress-optimized
  description: >
    Same stress questions as endevor-stress.yaml but using the 'optimized' description variant.
  repetitions: 5
  minSuccessRate: 0.5
  questionsFrom: broadcom/endevor-stress
  mockServers:
    - name: endevor-ews
      cliScript: "${ZOWE_MCP_MOCK_EWS_DIR}/dist/cli/index.js"
      initArgs: "init ENDEVOR --output {dataDir}"
      serveArgs: "serve --port ${availablePort}"
      pluginName: endevor
  cliPluginDescVariant: optimized
